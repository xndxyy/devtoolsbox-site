name: Deploy to Vercel
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_7Z7PKDUdNy4a0BjevULTaTYJ
          vercel-project-id: prj_b5Sw92sTn1jIx0sME31K76qRgBVM
          vercel-args: '--prod'
